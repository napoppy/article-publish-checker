<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' https: http:;">
    <title>文章发布状态监测系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; min-height: 100vh; }
        .header { background: linear-gradient(135deg, #1890ff 0%, #096dd9 100%); color: white; padding: 20px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
        .header h1 { font-size: 24px; font-weight: 500; }
        .container { max-width: 1200px; margin: 20px auto; padding: 0 20px; }
        .card { background: white; border-radius: 8px; padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 500; color: #333; }
        input[type="text"], textarea { width: 100%; padding: 10px; border: 1px solid #d9d9d9; border-radius: 4px; font-size: 14px; font-family: inherit; }
        textarea { height: 150px; resize: vertical; }
        .btn { background: #1890ff; color: white; border: none; padding: 10px 24px; border-radius: 4px; cursor: pointer; font-size: 14px; }
        .btn:hover { background: #40a9ff; }
        .btn:disabled { background: #d9d9d9; cursor: not-allowed; }
        .stats { display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
        .stat-box { flex: 1; min-width: 120px; background: white; padding: 20px; border-radius: 8px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .stat-value { font-size: 32px; font-weight: bold; color: #1890ff; }
        .stat-label { color: #666; margin-top: 5px; font-size: 14px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #1890ff; color: white; padding: 12px; text-align: left; }
        td { padding: 10px 12px; border-bottom: 1px solid #f0f0f0; }
        tr:hover { background: #fafafa; }
        .status-ok { color: #52c41a; font-weight: bold; }
        .status-fail { color: #ff4d4f; font-weight: bold; }
        .status-blocked { color: #faad14; font-weight: bold; }
        .keyword-tag { display: inline-block; background: #e6f7ff; color: #1890ff; padding: 2px 8px; border-radius: 4px; margin: 2px; font-size: 12px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { padding: 10px 20px; background: white; border: 1px solid #d9d9d9; border-radius: 4px; cursor: pointer; transition: all 0.2s; }
        .tab:hover { border-color: #1890ff; }
        .tab.active { background: #1890ff; color: white; border-color: #1890ff; }
        .hidden { display: none; }
        .url-item { padding: 12px 15px; background: #fafafa; border-radius: 6px; margin: 8px 0; display: flex; align-items: center; gap: 12px; border-left: 3px solid #1890ff; }
        .url-item .status-icon { font-size: 18px; width: 24px; text-align: center; }
        .url-item .url-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 14px; color: #333; }
        .url-item .status-text { font-weight: 500; min-width: 80px; }
        .url-item .url-code { color: #999; font-size: 12px; min-width: 50px; }
        .batch-result { max-height: 500px; overflow-y: auto; }
        .info-box { background: #f0f7ff; border: 1px solid #91caff; padding: 12px; border-radius: 4px; margin-bottom: 15px; color: #333; line-height: 1.6; }
        .history-item { padding: 12px; border-bottom: 1px solid #f0f0f0; cursor: pointer; border-radius: 4px; }
        .history-item:hover { background: #f5f5f5; }
        .history-item:last-child { border-bottom: none; }
        .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid #f3f3f3; border-top: 2px solid #1890ff; border-radius: 50%; animation: spin 1s linear infinite; margin-right: 8px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loading { display: flex; align-items: center; justify-content: center; padding: 40px; color: #666; }
    </style>
</head>
<body>
    <div class="header"><h1>多平台文章发布状态监测系统</h1></div>
    <div class="container">
        <div class="tabs">
            <div class="tab active" onclick="showTab('check')">URL检测</div>
            <div class="tab" onclick="showTab('history')">历史报告</div>
        </div>
        
        <div id="check-tab">
            <div class="card">
                <h3 style="margin-bottom: 15px;">输入URL进行检测 (支持批量，每行一个)</h3>
                <div class="info-box">
                    <strong>提示：</strong>部分平台（如掘金、CSDN、知乎等）有反爬机制，可能返回拦截页面。建议使用Cookie认证或直接在这些平台查看文章。
                </div>
                <div class="form-group">
                    <label>URL地址 (每行一个)</label>
                    <textarea id="urls" placeholder="https://blog.csdn.net/example/article/details/123456&#10;https://juejin.cn/post/123456789&#10;https://www.freebuf.com/articles/web/789012.html"></textarea>
                </div>
                <div class="form-group">
                    <label>关键词 (逗号分隔)</label>
                    <input type="text" id="keywords" value="pandawiki, monkeycode, 开源">
                </div>
                <button class="btn" id="checkBtn" onclick="checkUrls()">开始检测</button>
            </div>
            
            <div id="loading-area" class="card hidden">
                <div class="loading"><span class="spinner"></span>检测中，请稍候...</div>
            </div>
            
            <div id="result-area" class="hidden">
                <div class="stats" id="stats"></div>
                <div class="card batch-result">
                    <h4 style="margin-bottom: 15px;">检测结果</h4>
                    <div id="result-list"></div>
                </div>
            </div>
        </div>
        
        <div id="history-tab" class="hidden">
            <div class="card">
                <h3 style="margin-bottom: 15px;">历史报告</h3>
                <div id="file-list"></div>
            </div>
            <div id="history-content" class="hidden">
                <div class="stats" id="history-stats"></div>
                <div class="card">
                    <table id="history-table"></table>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const { checkUrls, getHistory, getHistoryFile } = window.electronAPI;
        
        async function showTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('check-tab').classList.toggle('hidden', tab !== 'check');
            document.getElementById('history-tab').classList.toggle('hidden', tab !== 'history');
            if (tab === 'history') await loadHistory();
        }
        
        async function checkUrls() {
            const urlsText = document.getElementById('urls').value.trim();
            const keywords = document.getElementById('keywords').value;
            if (!urlsText) { alert('请输入URL'); return; }
            
            const urls = urlsText.split('\n').filter(u => u.trim());
            if (urls.length === 0) { alert('请输入有效的URL'); return; }
            
            const btn = document.getElementById('checkBtn');
            btn.disabled = true;
            btn.textContent = '检测中...';
            
            document.getElementById('loading-area').classList.remove('hidden');
            document.getElementById('result-area').classList.add('hidden');
            
            try {
                const data = await checkUrls(urls, keywords);
                showResults(data);
            } catch (e) {
                alert('检测失败: ' + e);
            } finally {
                btn.disabled = false;
                btn.textContent = '开始检测';
                document.getElementById('loading-area').classList.add('hidden');
            }
        }
        
        function showResults(data) {
            document.getElementById('result-area').classList.remove('hidden');
            document.getElementById('stats').innerHTML = `
                <div class="stat-box"><div class="stat-value">${data.total}</div><div class="stat-label">总URL</div></div>
                <div class="stat-box"><div class="stat-value">${data.accessible}</div><div class="stat-label">可访问</div></div>
                <div class="stat-box"><div class="stat-value">${data.blocked}</div><div class="stat-label">反爬拦截</div></div>
                <div class="stat-box"><div class="stat-value">${data.with_keywords}</div><div class="stat-label">命中关键词</div></div>
            `;
            
            document.getElementById('result-list').innerHTML = data.results.map(r => `
                <div class="url-item">
                    <span class="status-icon">${r.blocked ? '⚠' : (r.可访问 === '可访问' ? '✓' : '✗')}</span>
                    <span class="url-text" title="${r.URL}">${r.URL}</span>
                    <span class="status-text ${r.blocked ? 'status-blocked' : (r.可访问 === '可访问' ? 'status-ok' : 'status-fail')}">${r.blocked ? '反爬拦截' : r.可访问}</span>
                    <span class="url-code">${r.状态码 || '-'}</span>
                    ${r.命中关键词 ? r.命中关键词.split(',').map(k => `<span class="keyword-tag">${k.trim()}</span>`).join('') : (r.blocked ? '<span style="color:#999;">需浏览器打开</span>' : '<span style="color:#999;">无</span>')}
                </div>
            `).join('');
        }
        
        async function loadHistory() {
            try {
                const files = await getHistory();
                const list = document.getElementById('file-list');
                if (!files || files.length === 0) {
                    list.innerHTML = '<p style="color:#666;padding:20px;">暂无历史报告</p>';
                    return;
                }
                list.innerHTML = files.map(f => `<div class="history-item" onclick="loadFile('${f}')">${f}</div>`).join('');
            } catch (e) {
                console.error('加载历史失败:', e);
            }
        }
        
        async function loadFile(filename) {
            try {
                const data = await getHistoryFile(filename);
                document.getElementById('history-content').classList.remove('hidden');
                document.getElementById('history-stats').innerHTML = `
                    <div class="stat-box"><div class="stat-value">${data.total}</div><div class="stat-label">总URL</div></div>
                    <div class="stat-box"><div class="stat-value">${data.accessible}</div><div class="stat-label">可访问</div></div>
                    <div class="stat-box"><div class="stat-value">${data.with_keywords}</div><div class="stat-label">命中关键词</div></div>
                `;
                document.getElementById('history-table').innerHTML = `
                    <thead><tr><th>平台</th><th>URL</th><th>状态</th><th>关键词</th></tr></thead>
                    <tbody>${data.rows.map(r => `
                        <tr>
                            <td>${r.平台}</td>
                            <td><a href="${r.URL}" target="_blank">${r.URL.substring(0, 50)}...</a></td>
                            <td class="${r.发布状态 === '可访问' ? 'status-ok' : 'status-fail'}">${r.发布状态}</td>
                            <td>${r.命中关键词 || '-'}</td>
                        </tr>
                    `).join('')}</tbody>
                `;
            } catch (e) {
                console.error('加载文件失败:', e);
            }
        }
    </script>
</body>
</html>
